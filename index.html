<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>민성의 자기소개</title>

    <!-- 스타일 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">

        <header>
            <h1>민성의 자기소개</h1>
        </header>

        <!-- 프로필 사진 -->
        <section class="image-area">
            <img src="image.jpg" alt="프로필">
        </section>

        <!-- 기본 정보 -->
        <section>
            <h2>기본 정보</h2>
            <p><strong>이름:</strong> 박민성 (2000.12.13)</p>
            <p><strong>전공:</strong> 동서대학교 영어학과</p>
            <p><strong>거주:</strong> 부산</p>
        </section>

        <!-- 나의 최근 이야기-->
        <section>
            <h2>나에 대해</h2>
            <p>2년 동안 야구 선수를 준비했던 경험이 있습니다.</p>
            <p>이후 야구를 그만두고 복학하여, 현재는 컴퓨터 공학에 흥미를 느껴 공부하고 있습니다.</p>
        </section>

        <!-- 관심사 -->
        <section>
            <h2>관심사</h2>
            <ul>
                <li>코딩에 대해 배우는중 </li>
                <li>운동, 야구 경기 시청하기 </li>
                <li>친구들과 대화하며 힐링하기 </li>
            </ul>
        </section>

        <!-- 마지막 -->
        <footer>
            <button onclick="showMessage()">마무리 인사</button>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
