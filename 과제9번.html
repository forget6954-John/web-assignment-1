<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>입력 양식</title>
    <style>
        table {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
<body>

<form>
    <table>
        <tr>
            <th>아이디</th>
            <td><input type="text"></td>
        </tr>
        <tr>
            <th>비밀번호</th>
            <td><input type="password"></td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="제출">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
